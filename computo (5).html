  const SUPA_HEADERS = {
    'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json'
  };

  let usuarioActual = null;

  function esAdmin()      { return usuarioActual && (usuarioActual.rol === 'admin'); }
  function esSubdirector(){ return usuarioActual && usuarioActual.rol === 'subdirector'; }
  function esJefeCC()     { return usuarioActual && usuarioActual.rol === 'jefe_depto' && (usuarioActual.area||'').includes('Cómputo'); }
  function puedeModificar(){ return esAdmin() || esJefeCC(); }

  function toast(msg, tipo='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = tipo==='error' ? '#c0392b' : '#4a2a8a';
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 3000);
  }

  function cerrarSesion() {
    sessionStorage.removeItem('cc-usuario');
    window.location.href = 'login.html';
  }

  function abrirCambioContrasena() {
    ['cp-actual','cp-nueva','cp-confirmar'].forEach(i => document.getElementById(i).value='');
    document.getElementById('cp-error').style.display='none';
    document.getElementById('modal-contrasena-overlay').style.display='flex';
  }

  async function guardarContrasena() {
    const actual = document.getElementById('cp-actual').value.trim();
    const nueva  = document.getElementById('cp-nueva').value.trim();
    const conf   = document.getElementById('cp-confirmar').value.trim();
    const err    = document.getElementById('cp-error');
    if (!actual||!nueva||!conf){err.textContent='Todos los campos son obligatorios.';err.style.display='block';return;}
    if (actual !== usuarioActual.password){err.textContent='La contraseña actual no es correcta.';err.style.display='block';return;}
    if (nueva.length < 6){err.textContent='Mínimo 6 caracteres.';err.style.display='block';return;}
    if (nueva !== conf){err.textContent='Las contraseñas no coinciden.';err.style.display='block';return;}
    err.style.display='none';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?id=eq.${usuarioActual.id}`,{
        method:'PATCH', headers:{...SUPA_HEADERS,'Prefer':'return=representation'}, body:JSON.stringify({password:nueva})
      });
      if (!res.ok) throw new Error();
      usuarioActual.password = nueva;
      sessionStorage.setItem('cc-usuario', JSON.stringify(usuarioActual));
      document.getElementById('modal-contrasena-overlay').style.display='none';
      toast('✅ Contraseña actualizada');
    } catch(e){ err.textContent='Error al guardar.';err.style.display='block'; }
  }

  window.onload = () => {
    const claves = ['cc-usuario','itc-login-usuario','itc-usuario'];
    let u = null;
    for (const k of claves) {
      const g = sessionStorage.getItem(k);
      if (g) { try { u = JSON.parse(g); break; } catch(e){} }
    }
    if (!u) { window.location.href='login.html'; return; }

    // Validar acceso
    const rolesPermitidos = ['admin','subdirector','jefe_depto_mant'];
    const esCC = u.rol === 'jefe_depto' && (u.area||'').toLowerCase().includes('cómputo');
    if (!rolesPermitidos.includes(u.rol) && !esCC) {
      window.location.href='login.html'; return;
    }

    usuarioActual = u;
    document.getElementById('header-usuario').textContent = u.nombre;
    inicializarCronograma('Centro de Cómputo', u.rol==='admin'||u.rol==='subdirector'||esCC);
  };

};

// ── Inicializar módulo ────────────────────────────────
async function inicializarCronograma(depto, puedeCrear) {
  cronoDepto = depto; // null = ve todos los deptos
  // Limpiar buscador al iniciar — forzar limpieza ignorando autocompletado
  const buscadorEl = document.getElementById('crono-buscar');
  if (buscadorEl) {
    buscadorEl.value = '';
    buscadorEl.setAttribute('autocomplete','off');
    // Doble limpieza para navegadores que restauran el valor
    setTimeout(() => { if(buscadorEl) buscadorEl.value = ''; }, 100);
  }
  poblarFiltroAreaCrono(depto);
  // Solo admin puro y subdirector ven el botón de nueva actividad
  const rolActualInit = typeof usuarioActual !== 'undefined' ? (usuarioActual?.rol || '') : '';
  const puedeCrearReal = puedeCrear && (rolActualInit === 'admin' || rolActualInit === 'subdirector');
  const btn = document.getElementById('btn-nueva-actividad');
  if (btn) btn.style.display = puedeCrearReal ? 'inline-block' : 'none';
  await cargarCronograma();
}

// ── Poblar filtro de área ─────────────────────────────
function poblarFiltroAreaCrono(depto) {
  const sel = document.getElementById('crono-filtro-area');
  if (!sel) return;
  sel.innerHTML = '<option value="">Todas las áreas</option>';
  const areas = depto ? (CRONO_AREAS_DEPTO[depto] || []) : Object.values(CRONO_AREAS_DEPTO).flat();
  [...new Set(areas)].forEach(a => {
    const o = document.createElement('option');
    o.value = a; o.textContent = a; sel.appendChild(o);
  });
}

// ── Cargar desde Supabase ─────────────────────────────
async function cargarCronograma() {
  const tbody = document.getElementById('crono-tbody');
  if (tbody) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">Cargando...</td></tr>';
  try {
    // Siempre cargar TODOS los datos — el filtro se aplica en render
    let url = SUPABASE_URL + '/rest/v1/cronograma_actividades?select=*&order=departamento,area,id';
    const res = await fetch(url, { headers: SUPA_HEADERS || {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY
    } });
    const d = await res.json();
    const raw = Array.isArray(d) ? d : [];
    const ENCABEZADOS = ['Actividad / Proceso','Frecuencia','Actividad / Proceso '];
    // Guardar TODO en cronoData, el filtro de depto se aplica en render
    cronoData = raw.filter(r =>
      r.area && r.area.trim() !== '' &&
      !ENCABEZADOS.includes((r.actividad||'').trim())
    );
    renderCronograma();
    renderCronoDashboard();
  } catch(e) {
    console.error('Error cargando cronograma:', e);
    if (tbody) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#c0392b">Error al cargar. Intenta de nuevo.</td></tr>';
  }
}

// ── Render tabla ──────────────────────────────────────
function renderCronograma() {
  const buscar   = (document.getElementById('crono-buscar')?.value || '').toLowerCase();
  const filtArea = document.getElementById('crono-filtro-area')?.value || '';
  const filtEst  = document.getElementById('crono-filtro-estado')?.value || '';
  const filtFrec = document.getElementById('crono-filtro-frecuencia')?.value || '';

  // Aplicar filtro de departamento primero
  const deptoFiltro = typeof filtroDeptoActual !== 'undefined' ? filtroDeptoActual : cronoDepto;

  let rows = cronoData.filter(r => {
    if (deptoFiltro && r.departamento !== deptoFiltro) return false;
    if (filtArea && r.area !== filtArea) return false;
    if (filtEst  && r.estado !== filtEst) return false;
    if (filtFrec && r.frecuencia !== filtFrec) return false;
    if (buscar && !(r.actividad||'').toLowerCase().includes(buscar) &&
        !(r.area||'').toLowerCase().includes(buscar)) return false;
    return true;
  });

  // Agrupar por área
  const grupos = {};
  rows.forEach(r => {
    const key = (r.departamento||'') + '||' + (r.area||'Sin área');
    if (!grupos[key]) grupos[key] = { depto: r.departamento, area: r.area||'Sin área', rows: [] };
    grupos[key].rows.push(r);
  });

  // Detectar tipo de columnas por departamento
  const deptoFiltroRender = typeof filtroDeptoActual !== 'undefined' ? filtroDeptoActual : cronoDepto;
  const esRMS = deptoFiltroRender === 'Recursos Materiales y Servicios' ||
    (!deptoFiltroRender && rows.some(r => r.departamento === 'Recursos Materiales y Servicios'));
  const esCC = deptoFiltroRender === 'Centro de Cómputo' ||
    (!deptoFiltroRender && rows.every(r => r.departamento === 'Centro de Cómputo'));

  // Header de tabla
  const thead = document.getElementById('crono-thead');
  const esAdminVista = !cronoDepto; // si no hay depto fijo es admin/subdirector

    ${esAdminVista ? '<th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Departamento</th>' : ''}
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Área</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Actividad / Proceso</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Frecuencia</th>
    ${esRMS ? '<th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Unidad</th><th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Referencia</th>' : ''}
    ${esCC ? '<th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:right">Cantidad</th>' : ''}
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:center;min-width:160px">% Avance</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:center">Estado</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:right">Monto $</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:left">Última actualización</th>
    <th style="padding:11px 12px;color:white;font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;text-align:center">Acciones</th>
  </tr>`;

  const tbody = document.getElementById('crono-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#888">No hay actividades con estos filtros.</td></tr>';
    return;
  }

        ${esAdminVista ? '<span style="opacity:0.6;margin-right:6px">'+g.depto+'</span>›' : ''} ${g.area}
        <span style="font-weight:400;color:#5a6b80;margin-left:8px">(${g.rows.length} actividades)</span>
      </td>
    </tr>`;

    g.rows.forEach(r => {
      const avance = r.porcentaje_avance ?? 0;
      const est = CRONO_ESTADOS[r.estado] || { color:'#888', bg:'#f5f5f5', icono:'—' };
      const barColor = avance >= 100 ? '#1a7a3c' : avance >= 70 ? '#2980b9' : avance >= 40 ? '#f39c12' : '#c0392b';

      html += `<tr style="border-bottom:1px solid #f0f4f8" onmouseover="this.style.background='#f8faff'" onmouseout="this.style.background=''">

        <td style="padding:10px 12px;min-width:160px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="flex:1;background:#e8eef7;border-radius:20px;height:8px;overflow:hidden">
              <div style="height:100%;width:${avance}%;background:${barColor};border-radius:20px;transition:width 0.3s"></div>

        </td>
        <td style="padding:10px 12px;text-align:center">
          ${r.estado ? `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:Montserrat,sans-serif;background:${est.bg};color:${est.color}">${est.icono} ${r.estado}</span>` : '—'}
        </td>
        
        <td style="padding:10px 12px;text-align:right;font-size:12px;font-weight:600;font-family:Montserrat,sans-serif;color:#1B396A">
          ${r.monto ? '$'+Number(r.monto).toLocaleString('es-MX',{minimumFractionDigits:2}) : '—'}
        </td>
        <td style="padding:10px 12px;font-size:10px;color:#5a6b80;line-height:1.7;white-space:nowrap">
          ${r.fecha_actualizacion
            ? `<div style="font-weight:600;color:#1a2340">${new Date(r.fecha_actualizacion).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}</div>
               <div style="color:#888">${r.actualizado_por||'—'}</div>`
            : '<span style="color:#bbb">Sin actualizar</span>'}
        </td>
        <td style="padding:10px 12px;text-align:center;white-space:nowrap">
          <button onclick="abrirModalActividad(${r.id})"
            style="padding:5px 10px;background:#1B396A;color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif">
            ✏️ Editar
          </button>
        </td>
      </tr>`;
    });
  });

  tbody.innerHTML = html;
  renderCronoStats(rows);
  // Actualizar dashboard cuando cambia el filtro de depto
  renderCronoDashboard();
}

// ── Stats rápidos ─────────────────────────────────────
function renderCronoStats(rows) {
  const total = rows.length;
  const terminados = rows.filter(r => r.estado === 'Terminado').length;
  const urgentes   = rows.filter(r => r.estado === 'Urgente').length;
  const enProceso  = rows.filter(r => r.estado === 'En proceso').length;
  const monto      = rows.reduce((s,r) => s + (r.monto||0), 0);
  const prom       = total ? Math.round(rows.reduce((s,r) => s+(r.porcentaje_avance||0),0)/total) : 0;

  const el = document.getElementById('crono-stats');
  if (!el) return;
  const card = (num, label, color, bg) =>
    `<div style="background:white;border-radius:12px;padding:14px;border-left:4px solid ${color};box-shadow:0 1px 6px rgba(0,0,0,0.06)">
      <div style="font-family:Montserrat,sans-serif;font-size:26px;font-weight:800;color:#1a2340">${num}</div>
      <div style="font-size:11px;color:#5a6b80;font-weight:600;margin-top:2px">${label}</div>
    </div>`;
  el.innerHTML =
    card(total, '📋 Total actividades', '#1B396A') +
    card(terminados, '✅ Terminadas', '#1a7a3c') +
    card(enProceso, '🔵 En proceso', '#2980b9') +
    card(urgentes, '🚨 Urgentes', '#c0392b') +
    card(prom+'%', '📊 Avance promedio', '#f39c12');
}

        const barColor = prom>=80?'#1a7a3c':prom>=50?'#2980b9':'#f39c12';
        cardsEl.innerHTML += `
          <div style="border:1px solid #e8eef7;border-radius:10px;padding:12px 14px;border-left:4px solid ${d.color}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

              <div style="font-family:Montserrat,sans-serif;font-size:18px;font-weight:800;color:${barColor}">${prom}%</div>
            </div>
            <div style="background:#e8eef7;border-radius:20px;height:8px;overflow:hidden;margin-bottom:6px">
              <div style="height:100%;width:${prom}%;background:${barColor};border-radius:20px;transition:width 0.5s"></div>
            </div>
            <div style="font-size:10px;color:#5a6b80;display:flex;gap:10px">
              <span>${total} actividades</span>
              <span style="color:#1a7a3c">✅ ${term} terminadas</span>
              ${urg>0?`<span style="color:#c0392b">🚨 ${urg} urgentes</span>`:''}
            </div>
          </div>`;
      });
    }

    // Gráfica apilada por depto
    setTimeout(() => {
      const ctx1 = document.getElementById('crono-chart-estado')?.getContext('2d');
      if (!ctx1) return;
      const deptoNames = ['Mantenimiento de Equipo','Recursos Materiales y Servicios','Centro de Cómputo'];
      const estados = ['Terminado','En proceso','Detenido','Urgente','Continuo'];
      const colores = ['#1a7a3c','#1B396A','#f39c12','#c0392b','#6f42c1'];
      const datasets = estados.map((est,i) => ({
        label: est,
        data: deptoNames.map(d => cronoData.filter(r=>r.departamento===d && r.estado===est).length),
        backgroundColor: colores[i], borderRadius: 4, borderWidth: 0
      }));
      if (cronoChart1) cronoChart1.destroy();
      cronoChart1 = new Chart(ctx1, {
        type: 'bar',
        data: { labels: ['Mantenimiento','Rec. Materiales','Cómputo'], datasets },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:6 } } },
          scales:{
            x:{ stacked:true, ticks:{font:{size:10}}, grid:{display:false} },
            y:{ stacked:true, beginAtZero:true, ticks:{font:{size:10}}, grid:{color:'#f0f4f8'} }
          }
        }
      });
    }, 200);

  } else {
    // Vista de un solo departamento: estado (dona) + avance por área (barra horizontal)
    el.style.gridTemplateColumns = '1fr 1fr';
    el.innerHTML = `
      <div style="background:white;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,0.07)">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1a2340;margin-bottom:4px">📊 Distribución por estado</div>
        <div style="font-size:11px;color:#5a6b80;margin-bottom:12px">Actividades de ${deptoActivo}</div>
        <div style="position:relative;height:200px"><canvas id="crono-chart-estado"></canvas></div>
      </div>
      <div style="background:white;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,0.07)">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1a2340;margin-bottom:4px">📈 Avance por área</div>
        <div style="font-size:11px;color:#5a6b80;margin-bottom:12px">% promedio de completitud</div>
        <div style="position:relative;height:200px"><canvas id="crono-chart-area"></canvas></div>
      </div>`;

    const deptoRows = cronoData.filter(r => r.departamento === deptoActivo);

    setTimeout(() => {
      // Dona de estados
      const estadoCounts = {};
      deptoRows.forEach(r => { estadoCounts[r.estado||'Sin estado'] = (estadoCounts[r.estado||'Sin estado']||0)+1; });
      const coloresEstado = {'Terminado':'#1a7a3c','En proceso':'#1B396A','Urgente':'#c0392b','Detenido':'#f39c12','Continuo':'#6f42c1','Sin estado':'#aaa'};
      const ctx1 = document.getElementById('crono-chart-estado')?.getContext('2d');
      if (ctx1) {
        if (cronoChart1) cronoChart1.destroy();
        cronoChart1 = new Chart(ctx1, {
          type: 'doughnut',
          data: { labels: Object.keys(estadoCounts), datasets: [{ data: Object.values(estadoCounts), backgroundColor: Object.keys(estadoCounts).map(k=>coloresEstado[k]||'#888'), borderWidth:2 }] },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:8 } } } }
        });
      }

      // Barra HORIZONTAL de avance por área (más legible que vertical)
      const areaAvance = {}, areaCount = {};
      deptoRows.forEach(r => {
        const a = r.area||'Sin área';
        areaAvance[a] = (areaAvance[a]||0)+(r.porcentaje_avance||0);
        areaCount[a]  = (areaCount[a]||0)+1;
      });
      const areas = Object.keys(areaAvance);
      const promedios = areas.map(a => Math.round(areaAvance[a]/areaCount[a]));
      const ctx2 = document.getElementById('crono-chart-area')?.getContext('2d');
      if (ctx2) {
        if (cronoChart2) cronoChart2.destroy();
        cronoChart2 = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: areas,
            datasets: [{ data: promedios, backgroundColor: promedios.map(p=>p>=80?'#1a7a3c':p>=50?'#2980b9':'#f39c12'), borderRadius:6, borderWidth:0 }]
          },
          options: {
            indexAxis: 'y',  // ← HORIZONTAL
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{ display:false } },
            scales:{
              x:{ beginAtZero:true, max:100, ticks:{callback:v=>v+'%',font:{size:10}}, grid:{color:'#f0f4f8'} },
              y:{ ticks:{font:{size:10}}, grid:{display:false} }
            }
          }
        });
      }
    }, 200);
  }
}

// ── Sincronizar estado según % avance ────────────────
function sincronizarEstadoCrono(valor) {
  const v = parseInt(valor);
  const selEstado = document.getElementById('cm-estado');
  if (!selEstado) return;
  if (v === 100) {
    selEstado.value = 'Terminado';
  } else if (v > 0 && selEstado.value === 'Terminado') {
    // Si baja de 100, regresar a En proceso automáticamente
    selEstado.value = 'En proceso';
  }
}

  const rolActual = typeof usuarioActual !== 'undefined' ? (usuarioActual?.rol || '') : '';

    camposReadOnly.forEach(fieldId => {
      const el = document.getElementById(fieldId);
      if (el) {
        el.disabled = true;
        el.style.opacity = '0.55';
        el.style.background = '#f0f0f0';
        el.style.cursor = 'not-allowed';
      }
    });

    setTimeout(() => {
      document.querySelectorAll('[onclick*="eliminarActividad"]').forEach(b => b.style.display = 'none');
    }, 50);
  }

function actualizarAreasCrono() {
  const depto = document.getElementById('cm-depto')?.value;
  const sel = document.getElementById('cm-area');
  const camposRMS = document.getElementById('cm-campos-rms');
  const camposCC  = document.getElementById('cm-campos-cc');
  if (!sel) return;
  const areas = CRONO_AREAS_DEPTO[depto] || [];
  sel.innerHTML = areas.map(a => `<option value="${a}">${a}</option>`).join('');
  if (camposRMS) camposRMS.style.display = depto === 'Recursos Materiales y Servicios' ? 'grid' : 'none';
  if (camposCC)  camposCC.style.display  = depto === 'Centro de Cómputo' ? 'grid' : 'none';
}

async function guardarActividad() {
  const actividad = document.getElementById('cm-actividad')?.value.trim();
  const depto     = document.getElementById('cm-depto')?.value || cronoDepto;
  const area      = document.getElementById('cm-area')?.value;
  if (!actividad || !depto || !area) {
    alert('Completa los campos obligatorios: Departamento, Área y Actividad.');
    return;
  }

  const avVal = document.getElementById('cm-avance')?.value;
  const payload = {
    departamento:       depto,
    area:               area,
    actividad:          actividad,
    frecuencia:         document.getElementById('cm-frecuencia')?.value || null,
    unidad:             document.getElementById('cm-unidad')?.value.trim() || null,
    referencia:         document.getElementById('cm-referencia')?.value.trim() || null,
    porcentaje_avance:  avVal !== '' ? parseInt(avVal) : null,
    estado:             document.getElementById('cm-estado')?.value || null,
    monto:              parseFloat(document.getElementById('cm-monto')?.value) || null,
    periodo:            document.getElementById('cm-periodo')?.value || '2026-01',
    notas:              document.getElementById('cm-notas')?.value.trim() || null,
    cantidad:           parseFloat(document.getElementById('cm-cantidad')?.value) || null,
    actualizado_por:    typeof usuarioActual !== 'undefined' ? usuarioActual.nombre : 'Sistema',
    fecha_actualizacion: new Date().toISOString()
  };

  const headers = typeof SUPA_HEADERS !== 'undefined' ? SUPA_HEADERS : {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY,
    'Content-Type': 'application/json', 'Prefer': 'return=representation'
  };

  try {
    let res;
    if (cronoEditing) {
      res = await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades?id=eq.'+cronoEditing, {
        method:'PATCH', headers, body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades', {
        method:'POST', headers, body: JSON.stringify(payload)
      });
    }
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('crono-modal-overlay')?.remove();
    if (typeof toast === 'function') toast(cronoEditing ? '✅ Actividad actualizada' : '✅ Actividad registrada');
    await cargarCronograma();
  } catch(e) {
    console.error(e);
    alert('Error al guardar: '+e.message);
  }
}

async function eliminarActividad(id) {
  if (!confirm('¿Eliminar esta actividad? Esta acción no se puede deshacer.')) return;
  const headers = typeof SUPA_HEADERS !== 'undefined' ? SUPA_HEADERS : {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json'
  };
  try {
    await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades?id=eq.'+id, { method:'DELETE', headers });
    document.getElementById('crono-modal-overlay')?.remove();
    if (typeof toast === 'function') toast('🗑️ Actividad eliminada');
    await cargarCronograma();
  } catch(e) { alert('Error al eliminar.'); }
}

// ── Exportar Excel ────────────────────────────────────
function exportarCronograma() {
  if (!cronoData.length) { if(typeof toast==='function') toast('Sin datos para exportar.','error'); return; }
  const filas = cronoData.map(r => ({
    'Departamento':r.departamento,'Área':r.area,'Actividad':r.actividad,
    'Frecuencia':r.frecuencia,'Unidad':r.unidad,'Referencia':r.referencia,
    '% Avance':r.porcentaje_avance,'Estado':r.estado,'Monto $':r.monto,
    'Período':r.periodo,'Notas':r.notas,'Actualizado por':r.actualizado_por
  }));
  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(filas), 'Cronograma');
    XLSX.writeFile(wb, 'Cronograma_ITC_'+new Date().toISOString().substring(0,10)+'.xlsx');
    if(typeof toast==='function') toast('📊 Excel exportado');
  }
}
