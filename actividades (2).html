// ── Inicializar módulo ────────────────────────────────
// ── Calcular días de alerta por frecuencia ────────────
function diasAlertaPorFrecuencia(frecuencia) {
  const mapa = {
    'Semanal': 10, 'Quincenal': 20, 'Mensual': 35,
    'Febrero-Octubre': 35, 'Bimestral': 70, 'Trimestral': 100,
    'Semestral': null, 'Anual': null, 'Diciembre': null,
    'Único': null, 'Eventual': null, 'Continuo': null, 'Diario': 3
  };
  return mapa[frecuencia] ?? null;
}

function esActividadSinMovimiento(r) {
  if ((r.porcentaje_avance ?? 0) >= 100) return false; // Terminada, no aplica
  if (r.estado === 'Terminado') return false;
  const diasAlerta = diasAlertaPorFrecuencia(r.frecuencia);
  if (!diasAlerta) {
    // Sin/Único/Eventual: alerta solo si 0% y más de 30 días sin tocar
    if ((r.porcentaje_avance ?? 0) === 0) {
      if (!r.fecha_actualizacion) return true;
      const dias = Math.floor((new Date() - new Date(r.fecha_actualizacion)) / 86400000);
      return dias > 30;
    }
    return false;
  }
  if (!r.fecha_actualizacion) return true; // Nunca actualizado
  const dias = Math.floor((new Date() - new Date(r.fecha_actualizacion)) / 86400000);
  return dias > diasAlerta;
}

function diasSinActualizar(r) {
  if (!r.fecha_actualizacion) return null;
  return Math.floor((new Date() - new Date(r.fecha_actualizacion)) / 86400000);
}


async function inicializarCronograma(depto, puedeCrear) {
  cronoDepto = depto; // null = ve todos los deptos
  // Limpiar buscador al iniciar — máxima fuerza contra autocompletado
  const buscadorEl = document.getElementById('crono-buscar');
  if (buscadorEl) {
    buscadorEl.value = '';
    buscadorEl.setAttribute('autocomplete','new-password'); // truco para deshabilitar autocompletado en Chrome
    buscadorEl.setAttribute('readonly', 'true');
    setTimeout(() => {
      if(buscadorEl) {
        buscadorEl.value = '';
        buscadorEl.removeAttribute('readonly');
      }
    }, 300);
  }
  poblarFiltroAreaCrono(depto);
  // Solo admin puro y subdirector ven el botón de nueva actividad
  const rolActualInit = typeof usuarioActual !== 'undefined' ? (usuarioActual?.rol || '') : '';
  const puedeCrearReal = puedeCrear && (rolActualInit === 'admin' || rolActualInit === 'subdirector');
  const btn = document.getElementById('btn-nueva-actividad');
  if (btn) btn.style.display = puedeCrearReal ? 'inline-block' : 'none';
  await cargarCronograma();
}

// ── Poblar filtro de área ─────────────────────────────
function poblarFiltroAreaCrono(depto) {
  const sel = document.getElementById('crono-filtro-area');
  if (!sel) return;
  sel.innerHTML = '<option value="">Todas las áreas</option>';
  const areas = depto ? (CRONO_AREAS_DEPTO[depto] || []) : Object.values(CRONO_AREAS_DEPTO).flat();
  [...new Set(areas)].forEach(a => {
    const o = document.createElement('option');
    o.value = a; o.textContent = a; sel.appendChild(o);
  });
}

// ── Cargar desde Supabase ─────────────────────────────
async function cargarCronograma() {
  const tbody = document.getElementById('crono-tbody');
  if (tbody) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#888">Cargando...</td></tr>';
  try {
    // Siempre cargar TODOS los datos — el filtro se aplica en render
    let url = SUPABASE_URL + '/rest/v1/cronograma_actividades?select=*&order=departamento,area,id';
    const res = await fetch(url, { headers: SUPA_HEADERS || {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY
    } });
    const d = await res.json();
    const raw = Array.isArray(d) ? d : [];
    const ENCABEZADOS = ['Actividad / Proceso','Frecuencia','Actividad / Proceso '];
    // Guardar TODO en cronoData, el filtro de depto se aplica en render
    cronoData = raw.filter(r =>
      r.area && r.area.trim() !== '' &&
      !ENCABEZADOS.includes((r.actividad||'').trim())
    );
    renderCronograma();
    renderCronoDashboard();
  } catch(e) {
    console.error('Error cargando cronograma:', e);
    if (tbody) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#c0392b">Error al cargar. Intenta de nuevo.</td></tr>';
  }
}

// ── Lógica de permisos para editar fila ──────────────
function _puedeEditarFila(r) {
  // Admin siempre puede editar todo
  if (typeof esAdmin === 'function' && esAdmin()) return true;

  // Subdirector: solo observa, nunca edita
  if (typeof esSubdirector === 'function' && esSubdirector()) return false;

  // Jefe de departamento: solo puede editar si el módulo está fijo a su depto
  // (es decir, está en su propio módulo rms.html, computo.html, etc.)
  if (typeof cronoDepto !== 'undefined' && cronoDepto &&
      cronoDepto === r.departamento) return true;

  // Por defecto: si hay función puedeModificar definida, usarla
  if (typeof puedeModificar === 'function') return puedeModificar();

  return false;
}


function renderCronograma() {
  // Limpiar autocompletado del navegador si contiene el nombre del usuario
  const buscadorEl = document.getElementById('crono-buscar');
  if (buscadorEl && typeof usuarioActual !== 'undefined' && usuarioActual) {
    const val = buscadorEl.value || '';
    const nombre = usuarioActual.nombre || '';
    const usuario = usuarioActual.usuario || '';
    // Si el buscador tiene el nombre/usuario del sistema, limpiarlo
    if (val && (nombre.toLowerCase().includes(val.toLowerCase()) ||
                usuario.toLowerCase().includes(val.toLowerCase()) ||
                val.toLowerCase().includes(usuario.toLowerCase()))) {
      buscadorEl.value = '';
    }
  }
  const buscar   = (document.getElementById('crono-buscar')?.value || '').toLowerCase();
  const filtArea = document.getElementById('crono-filtro-area')?.value || '';
  const filtEst  = document.getElementById('crono-filtro-estado')?.value || '';
  const filtFrec = document.getElementById('crono-filtro-frecuencia')?.value || '';

  // Aplicar filtro de departamento primero
  const deptoFiltro = typeof filtroDeptoActual !== 'undefined' ? filtroDeptoActual : cronoDepto;

  let rows = cronoData.filter(r => {
    if (deptoFiltro && r.departamento !== deptoFiltro) return false;
    if (filtArea && r.area !== filtArea) return false;
    if (filtEst  && r.estado !== filtEst) return false;
    if (filtFrec && r.frecuencia !== filtFrec) return false;
    if (buscar && !(r.actividad||'').toLowerCase().includes(buscar) &&
        !(r.area||'').toLowerCase().includes(buscar)) return false;
    return true;
  });

  // Agrupar por área
  const grupos = {};
  rows.forEach(r => {
    const key = (r.departamento||'') + '||' + (r.area||'Sin área');

    grupos[key].rows.push(r);

  // Detectar tipo de columnas por departamento
  const deptoFiltroRender = typeof filtroDeptoActual !== 'undefined' ? filtroDeptoActual : cronoDepto;

            : '<span style="color:#bbb">Sin actualizar</span>'}
        </td>
        <td style="padding:10px 12px;text-align:center;white-space:nowrap">
          ${_puedeEditarFila(r) ?
            '<button onclick="abrirModalActividad('+r.id+')" style="padding:5px 10px;background:#1B396A;color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif">✏️ Editar</button>'
            : '<span style="font-size:10px;color:#bbb">—</span>'}
        </td>
      </tr>`;
    });
  });

  tbody.innerHTML = html;
  renderCronoStats(rows);
  // Actualizar dashboard cuando cambia el filtro de depto
  renderCronoDashboard();
}

// ── Stats rápidos ─────────────────────────────────────
function renderCronoStats(rows) {
  const total = rows.length;
  const terminados = rows.filter(r => r.estado === 'Terminado').length;
  const urgentes   = rows.filter(r => r.estado === 'Urgente').length;
  const enProceso  = rows.filter(r => r.estado === 'En proceso').length;
  const monto      = rows.reduce((s,r) => s + (r.monto||0), 0);
  const prom       = total ? Math.round(rows.reduce((s,r) => s+(r.porcentaje_avance||0),0)/total) : 0;

  const el = document.getElementById('crono-stats');
  if (!el) return;
  const card = (num, label, color, bg) =>
    `<div style="background:white;border-radius:12px;padding:14px;border-left:4px solid ${color};box-shadow:0 1px 6px rgba(0,0,0,0.06)">
      <div style="font-family:Montserrat,sans-serif;font-size:26px;font-weight:800;color:#1a2340">${num}</div>
      <div style="font-size:11px;color:#5a6b80;font-weight:600;margin-top:2px">${label}</div>
    </div>`;
  el.innerHTML =
    card(total, '📋 Total actividades', '#1B396A') +
    card(terminados, '✅ Terminadas', '#1a7a3c') +
    card(enProceso, '🔵 En proceso', '#2980b9') +
    card(urgentes, '🚨 Urgentes', '#c0392b') +
    card(prom+'%', '📊 Avance promedio', '#f39c12');
}

          <div style="border:1px solid #e8eef7;border-radius:10px;padding:12px 14px;border-left:4px solid ${d.color}">

            </div>

    setTimeout(() => {
      const ctx1 = document.getElementById('crono-chart-estado')?.getContext('2d');
      if (!ctx1) return;
      const deptoNames = ['Mantenimiento de Equipo','Recursos Materiales y Servicios','Centro de Cómputo','Recursos Financieros','Recursos Humanos'];
      const estados = ['Terminado','En proceso','Detenido','Urgente','Continuo'];
      const colores = ['#1a7a3c','#1B396A','#f39c12','#c0392b','#6f42c1'];
      const datasets = estados.map((est,i) => ({
        label: est,
        data: deptoNames.map(d => cronoData.filter(r=>r.departamento===d && r.estado===est).length),

      cronoChart1 = new Chart(ctx1, {

        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:6 } } },
          scales:{
            x:{ stacked:true, ticks:{font:{size:10}}, grid:{display:false} },
            y:{ stacked:true, beginAtZero:true, ticks:{font:{size:10}}, grid:{color:'#f0f4f8'} }
          }
        }
      });
    }, 200);

  } else {
    // Vista de un solo departamento: estado (dona) + avance por área (barra horizontal)
    el.style.gridTemplateColumns = '1fr 1fr';

      <div style="background:white;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,0.07)">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1a2340;margin-bottom:4px">📊 Distribución por estado</div>

        <div style="position:relative;height:200px"><canvas id="crono-chart-estado"></canvas></div>
      </div>
      <div style="background:white;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,0.07)">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1a2340;margin-bottom:4px">📈 Avance por área</div>
        <div style="font-size:11px;color:#5a6b80;margin-bottom:12px">% promedio de completitud</div>
        <div style="position:relative;height:200px"><canvas id="crono-chart-area"></canvas></div>
      </div>`;

    const deptoRows = cronoData.filter(r => r.departamento === deptoActivo);

    setTimeout(() => {
      // Dona de estados
      const estadoCounts = {};
      deptoRows.forEach(r => { estadoCounts[r.estado||'Sin estado'] = (estadoCounts[r.estado||'Sin estado']||0)+1; });
      const coloresEstado = {'Terminado':'#1a7a3c','En proceso':'#1B396A','Urgente':'#c0392b','Detenido':'#f39c12','Continuo':'#6f42c1','Sin estado':'#aaa'};
      const ctx1 = document.getElementById('crono-chart-estado')?.getContext('2d');
      if (ctx1) {
        if (cronoChart1) cronoChart1.destroy();
        cronoChart1 = new Chart(ctx1, {
          type: 'doughnut',
          data: { labels: Object.keys(estadoCounts), datasets: [{ data: Object.values(estadoCounts), backgroundColor: Object.keys(estadoCounts).map(k=>coloresEstado[k]||'#888'), borderWidth:2 }] },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:8 } } } }
        });
      }

      // Barra HORIZONTAL de avance por área (más legible que vertical)
      const areaAvance = {}, areaCount = {};
      deptoRows.forEach(r => {
        const a = r.area||'Sin área';
        areaAvance[a] = (areaAvance[a]||0)+(r.porcentaje_avance||0);
        areaCount[a]  = (areaCount[a]||0)+1;
      });
      const areas = Object.keys(areaAvance);
      const promedios = areas.map(a => Math.round(areaAvance[a]/areaCount[a]));
      const ctx2 = document.getElementById('crono-chart-area')?.getContext('2d');
      if (ctx2) {
        if (cronoChart2) cronoChart2.destroy();
        cronoChart2 = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: areas,
            datasets: [{ data: promedios, backgroundColor: promedios.map(p=>p>=80?'#1a7a3c':p>=50?'#2980b9':'#f39c12'), borderRadius:6, borderWidth:0 }]
          },
          options: {
            indexAxis: 'y',  // ← HORIZONTAL
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{ display:false } },
            scales:{
              x:{ beginAtZero:true, max:100, ticks:{callback:v=>v+'%',font:{size:10}}, grid:{color:'#f0f4f8'} },
              y:{ ticks:{font:{size:10}}, grid:{display:false} }
            }
          }
        });
      }
    }, 200);
  }
}

// ── Sincronizar estado según % avance ────────────────
function sincronizarEstadoCrono(valor) {
  const v = parseInt(valor);
  const selEstado = document.getElementById('cm-estado');
  if (!selEstado) return;
  if (v === 100) {
    selEstado.value = 'Terminado';
  } else if (v > 0 && selEstado.value === 'Terminado') {
    // Si baja de 100, regresar a En proceso automáticamente
    selEstado.value = 'En proceso';
  }
}

  if (!puedeEditarTodo) {
    // Jefe de cualquier tipo: solo % avance, estado, monto y notas
    camposReadOnly.forEach(fieldId => {
      const el = document.getElementById(fieldId);

    });

      document.querySelectorAll('[onclick*="eliminarActividad"]').forEach(b => b.style.display = 'none');

function actualizarAreasCrono() {
  const depto = document.getElementById('cm-depto')?.value;
  const sel = document.getElementById('cm-area');
  const camposRMS = document.getElementById('cm-campos-rms');
  const camposCC  = document.getElementById('cm-campos-cc');
  if (!sel) return;
  const areas = CRONO_AREAS_DEPTO[depto] || [];
  sel.innerHTML = areas.map(a => `<option value="${a}">${a}</option>`).join('');
  if (camposRMS) camposRMS.style.display = depto === 'Recursos Materiales y Servicios' ? 'grid' : 'none';
  if (camposCC)  camposCC.style.display  = depto === 'Centro de Cómputo' ? 'grid' : 'none';
}

async function guardarActividad() {
  const actividad = document.getElementById('cm-actividad')?.value.trim();
  const depto     = document.getElementById('cm-depto')?.value || cronoDepto;
  const area      = document.getElementById('cm-area')?.value;
  if (!actividad || !depto || !area) {
    alert('Completa los campos obligatorios: Departamento, Área y Actividad.');
    return;
  }

  const avVal = document.getElementById('cm-avance')?.value;
  const payload = {
    departamento:       depto,
    area:               area,
    actividad:          actividad,
    frecuencia:         document.getElementById('cm-frecuencia')?.value || null,
    unidad:             document.getElementById('cm-unidad')?.value.trim() || null,
    referencia:         document.getElementById('cm-referencia')?.value.trim() || null,
    porcentaje_avance:  avVal !== '' ? parseInt(avVal) : null,
    estado:             document.getElementById('cm-estado')?.value || null,
    monto:              parseFloat(document.getElementById('cm-monto')?.value) || null,
    periodo:            document.getElementById('cm-periodo')?.value || '2026-01',
    notas:              document.getElementById('cm-notas')?.value.trim() || null,
    cantidad:           parseFloat(document.getElementById('cm-cantidad')?.value) || null,
    actualizado_por:    typeof usuarioActual !== 'undefined' ? usuarioActual.nombre : 'Sistema',
    fecha_actualizacion: new Date().toISOString()
  };

  const headers = typeof SUPA_HEADERS !== 'undefined' ? SUPA_HEADERS : {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY,
    'Content-Type': 'application/json', 'Prefer': 'return=representation'
  };

  try {
    let res;
    if (cronoEditing) {
      // Guardar historial ANTES de actualizar
      const anterior = cronoData.find(x => x.id === cronoEditing);
      if (anterior) {
        const histEntry = {
          actividad_id:        cronoEditing,
          departamento:        anterior.departamento,
          area:                anterior.area,
          actividad:           anterior.actividad,
          porcentaje_anterior: anterior.porcentaje_avance,
          porcentaje_nuevo:    payload.porcentaje_avance ?? anterior.porcentaje_avance,
          estado_anterior:     anterior.estado,
          estado_nuevo:        payload.estado ?? anterior.estado,
          monto_anterior:      anterior.monto,
          monto_nuevo:         payload.monto ?? anterior.monto,
          cantidad_anterior:   anterior.cantidad,
          cantidad_nueva:      payload.cantidad ?? anterior.cantidad,
          notas:               payload.notas || null,
          actualizado_por:     payload.actualizado_por
        };
        fetch(SUPABASE_URL+'/rest/v1/cronograma_historial', {
          method:'POST', headers, body: JSON.stringify(histEntry)
        }).catch(e => console.warn('Historial no guardado:', e));
      }
      res = await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades?id=eq.'+cronoEditing, {
        method:'PATCH', headers, body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades', {
        method:'POST', headers, body: JSON.stringify(payload)
      });
    }
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('crono-modal-overlay')?.remove();
    if (typeof toast === 'function') toast(cronoEditing ? '✅ Actividad actualizada' : '✅ Actividad registrada');
    await cargarCronograma();
  } catch(e) {
    console.error(e);
    alert('Error al guardar: '+e.message);
  }
}

async function eliminarActividad(id) {
  if (!confirm('¿Eliminar esta actividad? Esta acción no se puede deshacer.')) return;
  const headers = typeof SUPA_HEADERS !== 'undefined' ? SUPA_HEADERS : {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json'
  };
  try {
    await fetch(SUPABASE_URL+'/rest/v1/cronograma_actividades?id=eq.'+id, { method:'DELETE', headers });
    document.getElementById('crono-modal-overlay')?.remove();
    if (typeof toast === 'function') toast('🗑️ Actividad eliminada');
    await cargarCronograma();
  } catch(e) { alert('Error al eliminar.'); }
}

// ── Exportar Excel ────────────────────────────────────
function exportarCronograma() {
  if (!cronoData.length) { if(typeof toast==='function') toast('Sin datos para exportar.','error'); return; }
  const filas = cronoData.map(r => ({
    'Departamento':r.departamento,'Área':r.area,'Actividad':r.actividad,
    'Frecuencia':r.frecuencia,'Unidad':r.unidad,'Referencia':r.referencia,
    '% Avance':r.porcentaje_avance,'Estado':r.estado,'Monto $':r.monto,
    'Período':r.periodo,'Notas':r.notas,'Actualizado por':r.actualizado_por
  }));
  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(filas), 'Cronograma');
    XLSX.writeFile(wb, 'Cronograma_ITC_'+new Date().toISOString().substring(0,10)+'.xlsx');
    if(typeof toast==='function') toast('📊 Excel exportado');
  }
}

let reporteChart1 = null, reporteChart2 = null, reporteChart3 = null;

// ── Inicializar reporte ───────────────────────────────
async function inicializarReporte(depto) {
  const el = document.getElementById('tab-reporte-content');
  if (el) el.innerHTML = '<div style="text-align:center;padding:60px;color:#888">Cargando reporte...</div>';
  try {
    // Cargar actividades y historial en paralelo
    let urlAct = SUPABASE_URL + '/rest/v1/cronograma_actividades?select=*&order=departamento,area';
    if (depto) urlAct += '&departamento=eq.' + encodeURIComponent(depto);

    let urlHist = SUPABASE_URL + '/rest/v1/cronograma_historial?select=*&order=fecha_registro.desc';
    if (depto) urlHist += '&departamento=eq.' + encodeURIComponent(depto);

    const [resAct, resHist] = await Promise.all([
      fetch(urlAct, { headers: SUPA_HEADERS || { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } }),
      fetch(urlHist, { headers: SUPA_HEADERS || { apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY } })
    ]);

    const ENCABEZADOS = ['Actividad / Proceso','Frecuencia'];
    reporteData.actividades = (await resAct.json()).filter(r =>
      r.area && !ENCABEZADOS.includes((r.actividad||'').trim()));
    reporteData.historial   = await resHist.json();

    renderReporte(depto);
  } catch(e) {
    console.error('Error reporte:', e);
    if (el) el.innerHTML = '<div style="text-align:center;padding:40px;color:#c0392b">Error al cargar reporte.</div>';
  }
}

// ── Render tabla sin movimiento (evita template literals anidados) ──
function _renderTablaSinMov(sinMov, mostrarDepto) {
  if (mostrarDepto === undefined) mostrarDepto = true;
  let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<thead><tr style="background:#c0392b">';
  if (mostrarDepto) html += '<th style="padding:10px 12px;color:white;text-align:left;font-family:Montserrat,sans-serif">Departamento</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:left">Área</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:left">Actividad</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:center">Frecuencia</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:center">% Avance</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:center">Estado</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:center">Días sin actualizar</th>';
  html += '<th style="padding:10px 12px;color:white;text-align:left">Última actualización</th>';
  html += '</tr></thead><tbody>';

  sinMov.forEach((a, i) => {
    const dias = diasSinActualizar(a);
    const diasTxt = dias === null ? 'Nunca actualizado' : dias + ' días';
    const diasColor = dias === null || dias > 30 ? '#c0392b' : dias > 14 ? '#f39c12' : '#856404';
    const avColor = (a.porcentaje_avance||0) === 0 ? '#c0392b' : '#f39c12';
    const bg = i % 2 === 0 ? 'white' : '#fafafa';
    const estBadge = a.estado
      ? '<span style="padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:#fef3cd;color:#856404">' + a.estado + '</span>'
      : '—';
    const fechaStr = a.fecha_actualizacion
      ? new Date(a.fecha_actualizacion).toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric'})
      : '—';

    html += '<tr style="border-bottom:1px solid #f0f4f0;background:' + bg + '">';
    if (mostrarDepto) html += '<td style="padding:10px 12px;color:#5a6b80">' + (a.departamento||'—') + '</td>';
    html += '<td style="padding:10px 12px;font-weight:600">' + (a.area||'—') + '</td>';
    html += '<td style="padding:10px 12px;max-width:200px;line-height:1.4">' + (a.actividad||'—') + '</td>';
    html += '<td style="padding:10px 12px;text-align:center;color:#5a6b80">' + (a.frecuencia||'—') + '</td>';
    html += '<td style="padding:10px 12px;text-align:center;font-weight:700;color:' + avColor + '">' + (a.porcentaje_avance||0) + '%</td>';
    html += '<td style="padding:10px 12px;text-align:center">' + estBadge + '</td>';
    html += '<td style="padding:10px 12px;text-align:center;font-weight:700;color:' + diasColor + '">' + diasTxt + '</td>';
    html += '<td style="padding:10px 12px;font-size:11px;color:#5a6b80">' + fechaStr + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}


// ── Filtrar reporte completo por departamento ─────────
function filtrarReportePorDepto(depto) {
  // Actualizar el selector de exportar también
  const exportSel = document.getElementById('rpt-export-depto');
  if (exportSel) exportSel.value = depto;

  // Recalcular estadísticos con el filtro
  const acts = depto
    ? reporteData.actividades.filter(a => a.departamento === depto)
    : reporteData.actividades;

  // Actualizar tarjetas de stats
  _actualizarStats(acts);

  // Actualizar gráficas
  renderGraficaEstado(acts);
  renderGraficaArea(depto, acts);
  actualizarGraficaHistorial();

  // Actualizar tabla sin movimiento
  const sinMov = acts.filter(a => esActividadSinMovimiento(a))
    .sort((a,b) => (diasSinActualizar(b)||999)-(diasSinActualizar(a)||999));

  const sinMovEl = document.getElementById('rpt-sinmov-container');
  if (sinMovEl) {
    const titulo = sinMovEl.querySelector('.rpt-sinmov-titulo');
    if (titulo) titulo.textContent = 'Actividades sin movimiento (' + sinMov.length + ')';
    const body = sinMovEl.querySelector('.rpt-sinmov-body');
    if (body) body.innerHTML = sinMov.length === 0
      ? '<div style="text-align:center;padding:30px;color:#1a7a3c;font-weight:600">✅ Todas las actividades están al día</div>'
      : _renderTablaSinMov(sinMov, !depto);
  }

  // Actualizar resumen por área si hay depto seleccionado
  const resumenEl = document.getElementById('rpt-resumen-area');
  if (resumenEl) {
    if (depto) {
      const areas = {};
      acts.forEach(a => {
        const ar = a.area || 'Sin área';
        if (!areas[ar]) areas[ar] = { total:0, term:0, prom:0 };
        areas[ar].total++;
        if ((a.porcentaje_avance||0)>=100||a.estado==='Terminado') areas[ar].term++;
        areas[ar].prom += (a.porcentaje_avance||0);
      });
      let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">';
      Object.entries(areas).forEach(([ar, d]) => {
        const prom = d.total ? Math.round(d.prom/d.total) : 0;
        const barColor = prom>=80?'#1a7a3c':prom>=50?'#2980b9':'#f39c12';
        html += '<div style="border:1px solid #e8eef7;border-radius:10px;padding:12px">'
          + '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#1a2340;margin-bottom:6px">'+ar+'</div>'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
          + '<span style="font-size:10px;color:#5a6b80">'+d.total+' actividades</span>'
          + '<span style="font-size:12px;font-weight:800;color:'+barColor+'">'+prom+'%</span>'
          + '</div>'
          + '<div style="background:#e8eef7;border-radius:20px;height:6px;overflow:hidden">'
          + '<div style="height:100%;width:'+prom+'%;background:'+barColor+';border-radius:20px"></div>'
          + '</div>'
          + '</div>';
      });
      html += '</div>';
      resumenEl.innerHTML = html;
      resumenEl.style.display = 'block';
    } else {
      resumenEl.style.display = 'none';
    }
  }
}

function _actualizarStats(acts) {
  const total    = acts.length;
  const term     = acts.filter(a=>(a.porcentaje_avance||0)>=100||a.estado==='Terminado').length;
  const prom     = total ? Math.round(acts.reduce((s,a)=>s+(a.porcentaje_avance||0),0)/total) : 0;
  const sinMov   = acts.filter(a=>esActividadSinMovimiento(a)).length;
  const urgentes = acts.filter(a=>a.estado==='Urgente').length;

  const statsEl = document.getElementById('rpt-stats-grid');
  if (statsEl) {
    statsEl.innerHTML =
      statCard(total,'📋 Total actividades','#1B396A') +
      statCard(term,'✅ Terminadas','#1a7a3c') +
      statCard(prom+'%','📊 Avance promedio','#2980b9') +
      statCard(sinMov,'⚠️ Sin movimiento','#f39c12') +
      statCard(urgentes,'🚨 Urgentes','#c0392b');
  }
}

function renderGraficaEstado(actsParam) {
  const ctx = document.getElementById('rpt-chart-estado')?.getContext('2d');
  if (!ctx) return;
  if (reporteChart1) reporteChart1.destroy();
  const counts = {};
  const actsUsar = actsParam || reporteData.actividades;
  actsUsar.forEach(a => {
    const e = a.estado||'Sin estado';
    counts[e] = (counts[e]||0)+1;
  });
  const colores = {'Terminado':'#1a7a3c','En proceso':'#1B396A','Urgente':'#c0392b','Detenido':'#f39c12','Continuo':'#6f42c1','Sin estado':'#aaa'};
  reporteChart1 = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:Object.keys(counts), datasets:[{ data:Object.values(counts), backgroundColor:Object.keys(counts).map(k=>colores[k]||'#888'), borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:8 } } } }
  });
}

function renderGraficaArea(depto, actsParam) {
  const ctx = document.getElementById('rpt-chart-area')?.getContext('2d');
  if (!ctx) return;
  if (reporteChart2) reporteChart2.destroy();
  const areaAvance = {}, areaCount = {};
  const actsUsar = actsParam || reporteData.actividades;
  actsUsar.forEach(a => {
    const ar = a.area||'Sin área';
    areaAvance[ar] = (areaAvance[ar]||0)+(a.porcentaje_avance||0);
    areaCount[ar]  = (areaCount[ar]||0)+1;
  });
  const areas = Object.keys(areaAvance).slice(0,10);
  const promedios = areas.map(a => Math.round(areaAvance[a]/areaCount[a]));
  reporteChart2 = new Chart(ctx, {
    type:'bar',
    data:{
      labels: areas,
      datasets:[{ data:promedios, backgroundColor:promedios.map(p=>p>=80?'#1a7a3c':p>=50?'#2980b9':'#f39c12'), borderRadius:6, borderWidth:0 }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, max:100, ticks:{callback:v=>v+'%',font:{size:9}}, grid:{color:'#f0f4f8'} }, y:{ ticks:{font:{size:9}}, grid:{display:false} } }
    }
  });
}

function actualizarGraficaHistorial() {
  const ctx = document.getElementById('rpt-chart-historial')?.getContext('2d');
  if (!ctx) return;
  if (reporteChart3) reporteChart3.destroy();

  // Si es jefe (depto fijo), usar su depto; si es admin/subdirector, usar el selector
  const selectEl = document.getElementById('rpt-filtro-hist-depto');
  const deptoFijo = typeof cronoDepto !== 'undefined' && cronoDepto ? cronoDepto : null;
  const filtroDep = deptoFijo || (selectEl?.value || '');
  // Si hay depto fijo y el select existe, sincronizarlo
  if (deptoFijo && selectEl) selectEl.value = deptoFijo;
  let hist = reporteData.historial;
  if (filtroDep) hist = hist.filter(h => h.departamento === filtroDep);

  // Agrupar por fecha (día) y calcular promedio de % nuevo
  const porFecha = {};
  hist.forEach(h => {
    if (h.porcentaje_nuevo === null) return;
    const fecha = (h.fecha_registro||'').substring(0,10);
    if (!fecha) return;
    if (!porFecha[fecha]) porFecha[fecha] = { suma:0, count:0 };
    porFecha[fecha].suma += h.porcentaje_nuevo;
    porFecha[fecha].count++;
  });

  const fechas = Object.keys(porFecha).sort().slice(-30); // últimos 30 días con datos
  const promedios = fechas.map(f => Math.round(porFecha[f].suma/porFecha[f].count));

  if (fechas.length === 0) {
    ctx.canvas.parentElement.innerHTML = '<div style="text-align:center;padding:60px;color:#aaa;font-size:13px">Sin historial registrado aún.<br><span style="font-size:11px">El historial se genera al guardar cambios en las actividades.</span></div>';
    return;
  }

  reporteChart3 = new Chart(ctx, {
    type:'line',
    data:{
      labels: fechas.map(f => new Date(f+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'})),
      datasets:[{
        label:'% Avance promedio',
        data: promedios,
        borderColor:'#1B396A', backgroundColor:'rgba(27,57,106,0.1)',
        borderWidth:2, fill:true, tension:0.4, pointRadius:4,
        pointBackgroundColor:'#1B396A'
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        y:{ beginAtZero:true, max:100, ticks:{callback:v=>v+'%',font:{size:10}}, grid:{color:'#f0f4f8'} },
        x:{ ticks:{font:{size:10}}, grid:{display:false} }
      }
    }
  });
}

function exportarReporteExcel(deptoExport) {
  if (!reporteData.actividades.length) return;

  const actsExport = deptoExport
    ? reporteData.actividades.filter(a => a.departamento === deptoExport)
    : reporteData.actividades;
  const histExport = deptoExport
    ? reporteData.historial.filter(h => h.departamento === deptoExport)
    : reporteData.historial;
  const sinMov = actsExport.filter(a => esActividadSinMovimiento(a));
  const nombreArchivo = deptoExport
    ? deptoExport.split(' ').map(w=>w[0]).join('') + '_Reporte'
    : 'Reporte_Consolidado';

  const filas = sinMov.map(a => ({
    'Departamento': a.departamento,
    'Área': a.area,
    'Actividad': a.actividad,
    'Frecuencia': a.frecuencia,
    '% Avance': a.porcentaje_avance||0,
    'Estado': a.estado||'—',
    'Días sin actualizar': diasSinActualizar(a) ?? 'Nunca',
    'Última actualización': a.fecha_actualizacion
      ? new Date(a.fecha_actualizacion).toLocaleDateString('es-MX')
      : '—',
    'Actualizado por': a.actualizado_por||'—'
  }));

  // Hoja 2: todas las actividades
  const todasFilas = actsExport.map(a => ({
    'Departamento': a.departamento,
    'Área': a.area,
    'Actividad': a.actividad,
    'Frecuencia': a.frecuencia,
    '% Avance': a.porcentaje_avance||0,
    'Estado': a.estado||'—',
    'Monto $': a.monto||0,
    'Última actualización': a.fecha_actualizacion
      ? new Date(a.fecha_actualizacion).toLocaleDateString('es-MX')
      : '—',
    'Actualizado por': a.actualizado_por||'—'
  }));

  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(filas), 'Sin movimiento');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(todasFilas), 'Todas las actividades');
    if (reporteData.historial.length) {
      const histFilas = histExport.slice(0,500).map(h => ({
        'Fecha': h.fecha_registro ? new Date(h.fecha_registro).toLocaleDateString('es-MX') : '—',
        'Departamento': h.departamento,
        'Área': h.area,
        'Actividad': h.actividad,
        '% Anterior': h.porcentaje_anterior||0,
        '% Nuevo': h.porcentaje_nuevo||0,
        'Estado anterior': h.estado_anterior||'—',
        'Estado nuevo': h.estado_nuevo||'—',
        'Actualizado por': h.actualizado_por||'—'
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(histFilas), 'Historial');
    }
    XLSX.writeFile(wb, nombreArchivo+'_'+new Date().toISOString().substring(0,10)+'.xlsx');
    if (typeof toast === 'function') toast('📊 Excel exportado con 3 hojas');
  }
}

  // Override de renderCronograma para respetar filtro de departamento
  const _renderBase = renderCronograma;
  renderCronograma = function() {
    // Aplicar filtro de depto ANTES del render base
    // Guardamos el depto temporalmente en cronoDepto
    const deptoAnterior = cronoDepto;
    cronoDepto = filtroDeptoActual;
    _renderBase();
    cronoDepto = deptoAnterior;
  };

</script>
